<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="banner-title banner-desc">
  <title id="banner-title">Karet</title>
  <desc id="banner-desc">Personal finance dashboard &#8212; spending insights</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="55%" stop-color="#FFEDE0"/>
      <stop offset="100%" stop-color="#FFE8D6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="banner-carrot-body" x1="32" y1="16" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF8C5A"/>
      <stop offset="45%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="banner-carrot-shine" x1="28" y1="20" x2="34" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE0D0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFE0D0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="banner-leaf" x1="32" y1="2" x2="32" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#bg)" rx="16"/>
  <rect x="2" y="2" width="1196" height="276" fill="none" stroke="#E0E0E0" stroke-width="2" rx="14"/>
  <!-- subtle grid -->
  <g opacity="0.12" stroke="#2D2D2D" stroke-width="1" fill="none">
    <path d="M880 40v200M920 40v200M960 40v200M1000 40v200M1040 40v200M1080 40v200M1120 40v200"/>
    <path d="M860 200h280M860 160h280M860 120h280M860 80h280"/>
  </g>
  <!-- abstract bar chart -->
  <g transform="translate(900 88)" opacity="0.35">
    <rect x="0" y="72" width="28" height="48" rx="4" fill="#FF6B35"/>
    <rect x="44" y="48" width="28" height="72" rx="4" fill="#FF8C5A"/>
    <rect x="88" y="24" width="28" height="96" rx="4" fill="#4CAF50"/>
    <rect x="132" y="56" width="28" height="64" rx="4" fill="#66BB6A"/>
    <rect x="176" y="32" width="28" height="88" rx="4" fill="#388E3C"/>
  </g>
  <!-- pie hint -->
  <g transform="translate(1048 198)">
    <path d="M0 0 L0 -52 A52 52 0 0 1 45 -26 Z" fill="#FF6B35" opacity="0.45"/>
    <path d="M0 0 L45 -26 A52 52 0 0 1 0 52 Z" fill="#4CAF50" opacity="0.45"/>
    <path d="M0 0 L0 52 A52 52 0 0 1 -45 -26 Z" fill="#FFB088" opacity="0.4"/>
  </g>
  <!-- carrot logo (matches public/karet-logo.svg) -->
  <g transform="translate(56 44) scale(1.65)">
    <path d="M28 18 C26 19, 23 24, 22 30 Q21 44, 32 60 Q43 44, 42 30 C41 24, 38 19, 36 18 Z" fill="url(#banner-carrot-body)"/>
    <path d="M29 22 C28 28, 27 36, 30 48 C31 36, 30 28, 30 22 Z" fill="url(#banner-carrot-shine)"/>
    <path d="M25 30 Q32 29, 39 30" stroke="#E65100" stroke-width="1.1" fill="none" opacity="0.45"/>
    <path d="M24 36 Q32 35, 40 36" stroke="#E65100" stroke-width="1" fill="none" opacity="0.35"/>
    <path d="M27 43 Q32 42, 37 43" stroke="#E65100" stroke-width="0.9" fill="none" opacity="0.3"/>
    <path d="M30 19 C26 14, 16 8, 8 3 C10 6, 18 12, 24 16 C18 10, 12 7, 8 6 C14 10, 24 16, 29 19 Z" fill="url(#banner-leaf)"/>
    <path d="M29 19 C28 10, 29 4, 32 0 C35 4, 36 10, 35 19 Z" fill="url(#banner-leaf)"/>
    <path d="M34 19 C38 14, 48 8, 56 3 C54 6, 46 12, 40 16 C46 10, 52 7, 56 6 C50 10, 40 16, 35 19 Z" fill="url(#banner-leaf)"/>
    <circle cx="18" cy="12" r="1.3" fill="#FFB088" opacity="0.9"/>
    <circle cx="46" cy="10" r="1" fill="#FFB088" opacity="0.75"/>
    <circle cx="50" cy="22" r="1.1" fill="#FFB088" opacity="0.8"/>
  </g>
  <!-- brand underline -->
  <rect x="184" y="168" width="320" height="6" rx="3" fill="url(#accent)"/>
  <!-- typography -->
  <text x="184" y="132" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="#2D2D2D" letter-spacing="-0.02em">Karet</text>
  <text x="184" y="214" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" fill="#5A5A5A">Personal finance dashboard</text>
</svg>
