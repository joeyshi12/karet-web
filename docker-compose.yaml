name: karet

services:
  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - rustfs-data:/data

  karet-worker:
    image: ghcr.io/joeyshi12/karet-worker:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      KARET_CONFIG_PATH: /app/karet.yaml
      S3_BUCKET: karet-data
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_ENDPOINT_URL: http://rustfs:9000
      AWS_REGION: us-east-1
      POLARS_MAX_THREADS: "2"
    volumes:
      # Create the file on the host first: touch karet.yaml
      - ./karet.yaml:/app/karet.yaml
    depends_on:
      - rustfs

  karet-web:
    image: ghcr.io/joeyshi12/karet-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      S3_BUCKET: karet-data
      S3_PREFIX: clean/
      S3_ENDPOINT: http://rustfs:9000
      S3_FORCE_PATH_STYLE: "true"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
    depends_on:
      - rustfs

volumes:
  rustfs-data:
